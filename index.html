<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZOO Client Portal</title>
  <style>
    :root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#6366f1;--accent-light:#818cf8;--text:#e2e8f0;--text-dim:#94a3b8;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
    .header{background:var(--card);border-bottom:1px solid var(--border);padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:1.1rem;font-weight:700}
    .header .logo{font-size:1.3rem}
    .btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;transition:opacity .2s}
    .btn:hover{opacity:.85}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{background:var(--border)}
    .hero{padding:60px 30px;text-align:center;max-width:800px;margin:0 auto}
    .hero h2{font-size:2.5rem;font-weight:800;margin-bottom:15px;background:linear-gradient(135deg,var(--accent-light),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero p{color:var(--text-dim);font-size:1.1rem;margin-bottom:30px;line-height:1.6}
    .companies{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:0 30px 60px;max-width:1200px;margin:0 auto}
    .company-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color .2s}
    .company-card:hover{border-color:var(--accent)}
    .company-card h3{font-size:1.1rem;font-weight:600;margin-bottom:6px}
    .company-card .industry{font-size:.8rem;color:var(--accent-light);margin-bottom:12px}
    .company-card .desc{font-size:.85rem;color:var(--text-dim);line-height:1.5;margin-bottom:16px}
    .company-card .stats{display:flex;gap:16px;margin-bottom:16px}
    .company-card .stat{text-align:center}
    .company-card .stat .num{font-size:1.3rem;font-weight:700;color:var(--accent-light)}
    .company-card .stat .lbl{font-size:.7rem;color:var(--text-dim)}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600;background:rgba(99,102,241,.15);color:var(--accent-light)}
    .social-links{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .social-dot{display:inline-flex;align-items:center;gap:4px;font-size:.75rem;color:var(--text-dim)}
    .social-dot .dot{width:8px;height:8px;border-radius:50%}
    .updates-list{margin-top:12px}
    .update-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .update-row:last-child{border:none}
    .update-date{color:var(--text-dim)}
    .update-val{font-weight:600;color:var(--accent-light)}
    .footer{text-align:center;padding:40px;color:var(--text-dim);font-size:.85rem;border-top:1px solid var(--margin:20px 30px}
    @media(max-width:600px){
      .hero h2{font-size:1.8rem}
      .companies{grid-template-columns:1fr;padding:0 15px 40px}
      .header{padding:15px}
    }
  </style>
</head>
<body>

  <div><span class="logo">🦞</span> <strong>ZOO Portal</strong></div>
</div>

<div id="companies" class="companies"></div>

<div class="footer">
  🦞 ZOO Social Media Management · All businesses managed under one roof
</div>

function renderCompanies() {
  const container = document.getElementById('companies');
  container.innerHTML = companies.map(c => {
    const socialHtml = Object.entries(c.social).map(([p,name]) => {
      const color = platformColors[p] || '#666';
      return `<span class="social-dot"><span class="dot" style="background:${color}"></span>${name}</span>`;
    }).join('') || '<span style="color:var(--text-dim);font-size:.75rem">No accounts connected yet</span>';

    const latestUpdate = c.dailyUpdates[0];
    const updateHtml = latestUpdate ? `
      <div class="updates-list">
        <div class="update-row">
          <span class="update-date">${latestUpdate.date}</span>
          <span class="update-val">${latestUpdate.published} posts · ${latestUpdate.impressions.toLocaleString()} imp</span>
        </div>
        ${(latestUpdate.highlights||[]).map(h => `<div style="font-size:.75rem;color:var(--text-dim);padding:4px 0">• ${h}</div>`).join('')}
      </div>
    ` : '<div style="color:var(--text-dim);font-size:.8rem">No updates yet</div>';

    return `<div class="company-card">
      <h3>${c.name}</h3>
      <div class="industry">${c.industry}</div>
      <div class="desc">${c.desc}</div>
      <div class="stats">
        <div class="stat"><div class="num">${c.stats.posts}</div><div class="lbl">Posts</div></div>
        <div class="stat"><div class="num" style="color:var(--success)">${c.stats.published}</div><div class="lbl">Published</div></div>
        <div class="stat"><div class="num" style="color:var(--accent-light)">${c.stats.followers}</div><div class="lbl">Followers</div></div>
      </div>
      <div class="social-links">${socialHtml}</div>
      <div class="badge">Latest Update</div>
      ${updateHtml}
    </div>`;
  }).join('');
}

// Simulated real-time daily update counter
function updateTodayCount() {
  const today = new Date().toISOString().split('T')[0];
  const el = document.getElementById('today-count');
  if(el) el.textContent = new Date().toLocaleTimeString();
}

renderCompanies();
updateTodayCount();
setInterval(updateTodayCount, 60000);
