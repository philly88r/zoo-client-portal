<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#6366f1;--accent-light:#818cf8;--text:#e2e8f0;--text-dim:#94a3b8;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    /* Login Page */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:45px;max-width:420px;width:100%}
    .login-box .logo{text-align:center;font-size:2.5rem;margin-bottom:8px}
    .login-box h1{text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:6px}
    .login-box .subtitle{text-align:center;color:var(--text-dim);font-size:.9rem;margin-bottom:30px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.8rem;font-weight:500;margin-bottom:6px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
    .form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn:hover{opacity:.85;transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{background:var(--border)}
    .btn-sm{padding:8px 16px;font-size:.85rem;width:auto}
    .alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.9rem}
    .alert-error{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
    .alert-success{background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.2)}
    .divider{height:1px;background:var(--border);margin:20px 0}
    .demo-accounts{font-size:.75rem;color:var(--text-dim);line-height:1.6}
    .demo-accounts strong{color:var(--text)}
    /* Header */
    .header{background:var(--card);border-bottom:1px solid var(--border);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:10px}
    .header h1{font-size:1.1rem;font-weight:700}
    .header-right{display:flex;gap:12px;align-items:center}
    .user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg);border-radius:8px;font-size:.85rem}
    .user-badge .avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff}
    /* Main Layout */
    .container{max-width:1200px;margin:0 auto;padding:30px}
    .page{display:none}
    .page.active{display:block}
    /* Stats */
    .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:30px}
    .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
    .stat-box .number{font-size:2rem;font-weight:700;color:var(--accent-light)}
    .stat-box .label{font-size:.75rem;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    /* Companies Grid */
    .section-title{font-size:1.2rem;font-weight:700;margin-bottom:18px;margin-top:10px}
    .companies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-bottom:30px}
    .company-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .2s;cursor:pointer}
    .company-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
    .company-card h3{font-size:1.05rem;font-weight:600;margin-bottom:4px}
    .company-card .industry{font-size:.75rem;color:var(--accent-light);margin-bottom:10px}
    .company-card .desc{font-size:.82rem;color:(--text-dim);line-height:1.5;margin-bottom:14px}
    .company-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .company-stat{text-align:center;padding:8px;background:var(--bg);border-radius:8px}
    .company-stat .num{font-size:1rem;font-weight:700;color:var(--accent-light)}
    .company-stat .lbl{font-size:.6rem;color:var(--text-dim);text-transform:uppercase}
    .social-links{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
    .social-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:.7rem;background:var(--bg)}
    .social-badge .dot{width:6px;height:6px;border-radius:50%}
    .latest-update{font-size:.78rem;color:var(--text-dim);padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent)}
    .latest-update .date{font-weight:600;color:var(--accent-light);margin-bottom:3px}
    /* Updates */
    .updates-list{margin-top:5px}
    .update-item{padding:14px 0;border-bottom:1px solid var(--border)}
    .update-item:last-child{border:none}
    .update-date{font-size:.8rem;font-weight:600;color:(--accent-light);margin-bottom:6px;display:flex;align-items:center;gap:6px}
    .update-stats{font-size:.85rem;margin-bottom:6px}
    .update-highlights{font-size:.8rem;color:var(--text-dim);padding-left:16px}
    .update-highlights li{margin-bottom:3px}
    .update-today{background:rgba(99,102,241,.08);border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid rgba(99,102,241,.15)}
    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
    .card h3{font-size:.95rem;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    /* Back button */
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);text-decoration:none;font-size:.85rem;margin-bottom:18px;cursor:pointer;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .2s}
    .back-btn:hover{color:var(--text);border-color:var(--accent)}
    /* Tasks */
    .task-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .task-item:last-child{border:none}
    .task-info{display:flex;align-items:center;gap:10px}
    .task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;transition:all .2s}
    .task-check:hover{border-color:var(--accent)}
    .task-check.done{background:var(--success);border-color:var(--success);color:#fff}
    .task-title{font-size:.88rem}
    .task-title.done{text-decoration:line-through;color:var(--text-dim)}
    .badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.65rem;font-weight:600;text-transform:uppercase}
    .badge-published{background:rgba(34,197,94,.15);color:var(--success)}
    .badge-pending{background:rgba(245,158,11,.15);color:var(--warning)}
    .badge-high{background:rgba(239,68,68,.15);color:var(--danger)}
    .badge-medium{background:rgba(245,158,11,.15);color:var(--warning)}
    .badge-low{background:rgba(148,163,184,.15);color:var(--text-dim)}
    /* Dashboard grid */
    .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .full-width{grid-column:1/-1}
    /* Footer */
    .footer{text-align:center;padding:30px;color:var(--text-dim);font-size:.8rem;border-top:1px solid var(--border);margin-top:30px}

      .dashboard-grid{grid-template-columns:1fr}
      .header{padding:12px 15px}
      .stats-bar{grid-template-columns:repeat(2,1fr)}
      .login-box{padding:30px 20px}
    }
  </style>
</head>

  </div>

  <div class="footer">
    🦞 ZOO Social Media Management · All businesses managed under one roof
  </div>
</div>

// ========== AUTH ==========
function getUsers() {
  return JSON.parse(localStorage.getItem('zoo_users') || '[]');
}
function saveUsers(u) {
  localStorage.setItem('zoo_users', JSON.stringify(u));
}
function getSession() {
  return JSON.parse(localStorage.getItem('zoo_session') || 'null');
}
function saveSession(s) {
  localStorage.setItem('zoo_session', JSON.stringify(s));
}
function clearSession() {
  localStorage.removeItem('zoo_session');
}

function hashPw(pw) {
  // Simple hash for demo — in production use bcrypt
  let h = 0;
  for (let i = 0; i < pw.length; i++) {
    h = ((h << 5) - h) + pw.charCodeAt(i);
    h |= 0;
  }
  return 'h_' + Math.abs(h).toString(36);
}

function initDefaultUsers() {
  if (getUsers().length > 0) return;
  const users = [
    {email:'admin', password:hashPw('admin88'), role:'admin', name:'Admin', clientId:null},
    ...defaultCompanies.map(c => ({
      email: c.email,
      password: hashPw('client123'),
      role: 'client',
      name: c.name,
      clientId: c.id
    }))
  ];
  saveUsers(users);
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const password = hashPw(document.getElementById('login-password').value);
  const users = getUsers();
  const user = users.find(u => u.email === email && u.password === password);
  
  if (!user) {
    document.getElementById('login-error').innerHTML = '<div class="alert alert-error">Invalid email or password</div>';
    return false;
  }
  
  saveSession({email: user.email, role: user.role, name: user.name, clientId: user.clientId});
  showApp();
  return false;
}

function handleRegister(e) {
  e.preventDefault();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const pw = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  
  if (pw !== confirm) {
    document.getElementById('register-error').innerHTML = '<div class="alert alert-error">Passwords do not match</div>';
    return false;
  }
  if (pw.length < 6) {
    document.getElementById('register-error').innerHTML = '<div class="alert alert-error">Password must be at least 6 characters</div>';
    return false;
  }
  
  const users = getUsers();
  if (users.find(u => u.email === email)) {
    document.getElementById('register-error').innerHTML = '<div class="alert alert-error">Email already registered</div>';
    return false;
  }
  
  users.push({email, password:hashPw(pw), role:'admin', name:'Admin', clientId:null});
  saveUsers(users);
  saveSession({email, role:'admin', name:'Admin', clientId:null});
  showApp();
  return false;
}

function handleLogout() {
  clearSession();
  showLogin();
}

// ========== UI ==========
function showLogin() {
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('page-register').style.display = 'none';
  document.getElementById('page-app').style.display = 'none';
  document.getElementById('login-error').innerHTML = '';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

function showRegister() {
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-register').style.display = 'flex';
  document.getElementById('register-error').innerHTML = '';
}

function showApp() {
  const session = getSession();
  if (!session) { showLogin(); return; }
  
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-register').style.display = 'none';
  document.getElementById('page-app').style.display = 'block';
  
  // Set user badge
  document.getElementById('user-name').textContent = session.name;
  document.getElementById('user-avatar').textContent = session.name.charAt(0).toUpperCase();
  
  if (session.role === 'admin') {
    document.getElementById('view-admin').style.display = 'block';
    document.getElementById('view-client').style.display = 'none';
    renderAdmin();
  } else {
    document.getElementById('view-admin').style.display = 'none';
    document.getElementById('view-client').style.display = 'block';
    renderClient(session.clientId);
  }
}

function renderAdmin() {
  const companies = defaultCompanies;
  const today = new Date().toISOString().split('T')[0];
  
  // Stats
  const totalPosts = companies.reduce((s,c) => s + c.stats.posts, 0);
  const totalPublished = companies.reduce((s,c) => s + c.stats.published, 0);
  const totalFollowers = companies.reduce((s,c) => s + c.stats.followers, 0);
  
  document.getElementById('admin-stats').innerHTML = `
    <div class="stat-box"><div class="number">${companies.length}</div><div class="label">Companies</div></div>
    <div class="stat-box"><div class="number">${totalPosts}</div><div class="label">Total Posts</div></div>
    <div class="stat-box"><div class="number" style="color:var(--success)">${totalPublished}</div><div class="label">Published</div></div>
    <div class="stat-box"><div class="number" style="color:var(--warning)">${totalFollowers.toLocaleString()}</div><div class="label">Followers</div></div>
  `;
  
  // Companies grid
  document.getElementById('admin-companies').innerHTML = companies.map(c => {
    const socialHtml = Object.entries(c.social).map(([p,name]) => {
      return `<span class="social-badge"><span class="dot" style="background:${platformColors[p]||'#666'}"></span>${name}</span>`;
    }).join('') || '<span style="color:var(--text-dim);font-size:.7rem">No accounts</span>';
    const latest = c.updates[0];
    return `<div class="company-card" onclick="renderClient(${c.id});document.getElementById('view-admin').style.display='none';document.getElementById('view-client').style.display='block';">
      <h3>${c.name}</h3>
      <div class="industry">${c.industry}</div>
      <div class="company-stats">
        <div class="company-stat"><div class="num">${c.stats.posts}</div><div class="lbl">Posts</div></div>
        <div class="company-stat"><div class="num" style="color:var(--success)">${c.stats.published}</div><div class="lbl">Published</div></div>
        <div class="company-stat"><div class="num" style="color:var(--accent-light)">${c.stats.followers}</div><div class="lbl">Followers</div></div>
      </div>
      <div class="social-links">${socialHtml}</div>
      ${latest ? `<div class="latest-update"><div class="date">${latest.date} — ${latest.published} posts</div><div style="font-size:.72rem;color:var(--text-dim);margin-top:2px">${latest.highlights[0]}</div></div>` : ''}
    </div>`;
  }).join('');
  
  // Today's updates
  const todayUpdates = [];
  companies.forEach(c => {
    const todayUp = c.updates.find(u => u.date === today) || c.updates[0];
    if (todayUp) todayUpdates.push({company: c.name, ...todayUp});
  });
  
  document.getElementById('admin-today-updates').innerHTML = todayUpdates.length > 0
    ? `<div class="card"><div class="updates-list">${todayUpdates.map(u => `
        <div class="update-item">
          <div class="update-date">🏢 ${u.company} — ${u.date}</div>
          <div class="update-stats">${u.published} posts published · ${u.impressions.toLocaleString()} impressions</div>
          <ul class="update-highlights">${u.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
        </div>`).join('')}</div></div>`
    : '<div class="card"><p style="color:var(--text-dim)">No updates yet today.</p></div>';
}

function renderClient(id) {
  const c = defaultCompanies.find(x => x.id === id);
  if (!c) return;
  
  const session = getSession();
  const isAdmin = session && session.role === 'admin';
  
  const socialHtml = Object.entries(c.social).map(([p,name]) => {
    return `<span class="social-badge" style="padding:5px 12px;font-size:.8rem"><span class="dot" style="background:${platformColors[p]||'#666'}"></span>${name}</span>`;
  }).join('') || '<span style="color:var(--text-dim)">No accounts connected yet</span>';
  
  const updatesHtml = c.updates.map(u => `
    <div class="update-item">
      <div class="update-date">📅 ${u.date}</div>
      <div class="update-stats">${u.published} posts published · ${u.impressions.toLocaleString()} impressions</div>
      <ul class="update-highlights">${u.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
    </div>`).join('') || '<p style="color:var(--text-dim)">No updates yet.</p>';
  
  const tasksHtml = c.tasks.map((t,i) => `
    <div class="task-item">
      <div class="task-info">
        <div class="task-check ${t.status==='completed'?'done':''}" onclick="toggleTask(${id},${i})">${t.status==='completed'?'✓':''}</div>
        <span class="task-title ${t.status==='completed'?'done':''}">${t.title}</span>
      </div>
      <span class="badge badge-${t.priority}">${t.priority}</span>
    </div>`).join('') || '<p style="color:var(--text-dim)">No tasks.</p>';
  
  document.getElementById('client-area').innerHTML = `
    ${isAdmin ? '<a class="back-btn" onclick="document.getElementById(\'view-admin\').style.display=\'block\';document.getElementById(\'view-client\').style.display=\'none\'">← Back to All Companies</a>' : ''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:15px">
      <div>
        <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:6px">${c.name}</h2>
        <div style="color:var(--text-dim);font-size:.9rem">${c.industry}</div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-box"><div class="number">${c.stats.posts}</div><div class="label">Total Posts</div></div>
      <div class="stat-box"><div class="number" style="color:var(--success)">${c.stats.published}</div><div class="label">Published</div></div>
      <div class="stat-box"><div class="number" style="color:var(--accent-light)">${c.stats.scheduled}</div><div class="label">Scheduled</div></div>
      <div class="stat-box"><div class="number" style="color:var(--warning)">${c.stats.followers}</div><div class="label">Followers</div></div>
    </div>
    <div class="card" style="margin-bottom:18px"><h3>🔗 Connected Accounts</h3><div class="social-links" style="margin-top:10px">${socialHtml}</div></div>
    <div class="dashboard-grid">
      <div>
        <div class="card"><h3>📅 Daily Updates</h3><div class="updates-list">${updatesHtml}</div></div>
      </div>
      <div>
        <div class="card"><h3>✅ Tasks</h3>${tasksHtml}</div>
        <div class="card"><h3>📊 Quick Stats</h3>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim);font-size:.85rem">Engagement Rate</span><span style="font-weight:600">4.2%</span></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim);font-size:.85rem">Avg. Impressions</span><span style="font-weight:600">3.1K</span></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim);font-size:.85rem">Best Day</span><span style="font-weight:600">Tuesday</span></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0"><span style="color:var(--text-dim);font-size:.85rem">This Month</span><span style="font-weight:600">${c.stats.posts} posts</span></div>
        </div>
      </div>
    </div>
  `;
}

function toggleTask(companyId, taskIndex) {
  // In a real app this would persist. For demo just toggle visually
  const el = document.querySelectorAll('.task-check')[taskIndex];
  const title = document.querySelectorAll('.task-title')[taskIndex];
  if (el.classList.contains('done')) {
    el.classList.remove('done');
    el.textContent = '';
    title.classList.remove('done');
  } else {
    el.classList.add('done');
    el.textContent = '✓';
    title.classList.add('done');
  }
}

// ========== INIT ==========
initDefaultUsers();
const session = getSession();
if (session) {
  showApp();
} else {
  showLogin();
}
</script>
